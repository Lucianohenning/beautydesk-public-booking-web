<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7efff" />
    <meta name="color-scheme" content="light" />
    <title>BeautyDesk — Agendamento Online</title>
    <meta
      name="description"
      content="Agende seu horário online com uma profissional BeautyDesk. Escolha serviço, data, horário e confirme em poucos passos."
    />
    <link rel="preconnect" href="https://api.beautydesk.app.br" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-glow bg-glow-one"></div>
      <div class="bg-glow bg-glow-two"></div>

      <main id="app" class="app-card" aria-live="polite">
        <section class="loading-screen">
          <div class="brand-mark">B</div>
          <p>Carregando agendamento...</p>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
